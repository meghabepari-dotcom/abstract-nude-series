<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abstract Nude Illustration Series</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;1,400&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    
    <style>
        :root { 
            --card-size: 140px; 
            --page-bg: #111111;    
            --card-bg: #ffffff;    
            --accent: #d4af37;     
            --text-main: #f0f0f0;
        }

        body { 
            font-family: 'Montserrat', sans-serif; 
            background: var(--page-bg); 
            color: var(--text-main); 
            display: flex; flex-direction: column; align-items: center; 
            padding: 40px 20px; margin: 0;
            min-height: 100vh;
        }

        h1 { font-family: 'Playfair Display', serif; font-size: 2.8rem; color: var(--accent); margin-bottom: 5px; text-align: center; }
        .instruction-text { font-family: 'Playfair Display', serif; font-style: italic; font-size: 1.1rem; margin-bottom: 25px; color: #777; }
        
        #dashboard-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-bottom: 20px; }
        #dashboard { display: flex; gap: 30px; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; }
        .metric span { color: var(--accent); font-weight: bold; }

        /* Abort/Skip Button Style */
        #abort-btn {
            background: transparent;
            border: 1px solid #444;
            color: #777;
            padding: 8px 16px;
            font-size: 0.7rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s ease;
        }
        #abort-btn:hover { border-color: var(--accent); color: var(--accent); }

        #game-board { display: grid; grid-template-columns: repeat(6, 1fr); gap: 15px; max-width: 950px; padding: 20px; }

        .card { width: var(--card-size); height: var(--card-size); cursor: pointer; perspective: 1000px; opacity: 0; transform: translateY(20px); }
        .reveal { animation: cardEntrance 0.6s ease-out forwards; }

        .card-inner { position: relative; width: 100%; height: 100%; transition: transform 0.6s; transform-style: preserve-3d; }
        .card.flipped .card-inner { transform: rotateY(180deg); }

        .card-back { background: #222 url('logo.jpg') center/50% no-repeat; border: 1px solid #333; border-radius: 4px; position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }
        .card-front { background-color: var(--card-bg); background-size: contain; background-repeat: no-repeat; background-position: center; transform: rotateY(180deg); border: 1px solid #fff; border-radius: 4px; position: absolute; width: 100%; height: 100%; backface-visibility: hidden; }

        .matched .card-front { border: 2px solid var(--accent); box-shadow: 0 0 15px rgba(212, 175, 55, 0.4); }
        .matched { pointer-events: none; }

        /* Completion Sections */
        #completion-area { display: none; text-align: center; margin-top: 50px; width: 100%; max-width: 1000px; animation: fadeIn 1.5s ease-in; }
        #outreach-section { margin-bottom: 60px; }
        .outreach-text { font-family: 'Playfair Display', serif; font-size: 1.3rem; color: #ccc; margin-bottom: 15px; }
        #artist-link { color: var(--accent); text-decoration: none; font-weight: 500; border-bottom: 1px solid var(--accent); padding-bottom: 2px; transition: all 0.3s ease; }
        #artist-link:hover { color: #fff; border-bottom-color: #fff; letter-spacing: 1px; }

        .gallery-title { font-family: 'Playfair Display', serif; font-size: 2rem; color: var(--accent); margin-bottom: 30px; border-top: 1px solid #333; padding-top: 40px; }
        .static-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; padding-bottom: 80px; }
        .gallery-item { background: var(--card-bg); border-radius: 4px; padding: 10px; }
        .gallery-item img { width: 100%; height: auto; display: block; }

        @keyframes cardEntrance { to { opacity: 1; transform: translateY(0); } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <h1>Abstract Nude Illustration Series</h1>
    
    <div id="dashboard-container">
        <div id="dashboard">
            <div class="metric">Attempts: <span id="turn-count">0</span></div>
            <div class="metric">Matched: <span id="match-count">0</span> / 24</div>
        </div>
        <button id="abort-btn" onclick="showFinalGallery()">Skip to Full Gallery</button>
    </div>

    <div class="instruction-text">Match two different styles of the same design series</div>
    
    <div id="game-board"></div>

    <div id="completion-area">
        <div id="outreach-section">
            <p class="outreach-text">If you like the illustrations and want to explore more,</p>
            <a id="artist-link" href="https://www.linkedin.com/in/brishtib/" target="_blank">please click here to reach out to the artist</a>
        </div>

        <h2 class="gallery-title">The Full Collection</h2>
        <div id="static-gallery" class="static-grid"></div>
    </div>

    <script>
        const board = document.getElementById('game-board');
        const turnDisplay = document.getElementById('turn-count');
        const matchDisplay = document.getElementById('match-count');
        const completionArea = document.getElementById('completion-area');
        const staticGallery = document.getElementById('static-gallery');
        const abortBtn = document.getElementById('abort-btn');
        
        let flippedCards = [];
        let turns = 0;
        let totalMatched = 0;
        let gameActive = true;

        let cardList = [];
        for (let d = 1; d <= 4; d++) {
            for (let s = 1; s <= 6; s++) {
                cardList.push({ id: `d${d}`, file: `d${d}_s${s}.png` });
            }
        }

        const galleryOrder = [...cardList];
        cardList.sort(() => Math.random() - 0.5);

        cardList.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'card';
            card.dataset.design = item.id;
            card.innerHTML = `<div class="card-inner"><div class="card-back"></div><div class="card-front" style="background-image: url('${item.file}')"></div></div>`;
            setTimeout(() => card.classList.add('reveal'), 100 + (index * 30)); 
            card.addEventListener('click', () => handleFlip(card));
            board.appendChild(card);
        });

        function handleFlip(card) {
            if (!gameActive) return;
            if (flippedCards.length < 2 && !card.classList.contains('flipped')) {
                card.classList.add('flipped');
                flippedCards.push(card);

                if (flippedCards.length === 2) {
                    turns++;
                    turnDisplay.innerText = turns;
                    setTimeout(checkMatch, 800);
                }
            }
        }

        function checkMatch() {
            const [card1, card2] = flippedCards;
            if (card1.dataset.design === card2.dataset.design) {
                card1.classList.add('matched');
                card2.classList.add('matched');
                totalMatched += 2;
                matchDisplay.innerText = totalMatched;
                flippedCards = [];

                if (totalMatched === 24) {
                    showFinalGallery();
                }
            } else {
                card1.classList.remove('flipped');
                card2.classList.remove('flipped');
                flippedCards = [];
            }
        }

        function showFinalGallery() {
            gameActive = false;
            // Hide game board and instructions to focus on static art
            board.style.display = 'none';
            document.querySelector('.instruction-text').style.display = 'none';
            abortBtn.style.display = 'none';
            
            // Build the gallery
            staticGallery.innerHTML = ''; // Clear previous if any
            galleryOrder.forEach(item => {
                const div = document.createElement('div');
                div.className = 'gallery-item';
                div.innerHTML = `<img src="${item.file}" alt="Illustration">`;
                staticGallery.appendChild(div);
            });

            completionArea.style.display = 'block';
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>
</body>
</html>
